name: Node addon (#44)

# Build the napi-rs prebuilt binaries per platform/arch and publish them to npm on
# a GitHub release. The native addon wraps the pure-Rust core (no Python), so the
# prebuilds install with no Rust toolchain. PR-time build+test is handled by the
# `node` job in ci.yml (against the LOCAL core); this workflow is the release path
# (against the PUBLISHED core, like publish-ruby.yml) and the per-platform prebuild
# producer. Mirrors publish-ruby.yml.
on:
  push:
    branches: [main]
    paths: ["bindings/node/**", ".github/workflows/publish-node.yml"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: bindings/node

jobs:
  # ── Wait for the published core on crates.io (#500 release race) ──
  # On `release: published`, this publisher fires in parallel with publish.yml
  # (core → crates.io), but on the real publish path the `disarm_core` dep is a
  # REGISTRY dependency with NO [patch.crates-io] redirect (the #374 step in
  # `build` patches ONLY on non-publish events). publish.yml pushes `disarm` to
  # crates.io only after its Tier-3 gate + multi-platform wheels (several minutes),
  # so an un-gated build starts first and dies with "failed to select a version for
  # the requirement `disarm = ^0.<minor>`". Gate the build on this single upstream
  # job (issue #500 option 3, scoped within this workflow so the OIDC Trusted
  # Publisher filename is preserved) instead of polling once per matrix leg. Publish
  # path only — this job is skipped on a push to main. `build` therefore guards its
  # own `if:` so a *skipped* wait-for-core (push validation) still runs the build,
  # while a *failed* one (core never landed) correctly blocks it (see `build.if`).
  wait-for-core:
    name: Wait for the published core
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Poll the crates.io sparse index for the target core version
        # `working-directory: bindings/node` comes from the workflow-level defaults,
        # so `Cargo.toml` is the node binding's manifest.
        shell: bash
        run: |
          req="$(sed -nE 's/.*package = "disarm", version = "([0-9]+\.[0-9]+)".*/\1/p' Cargo.toml | head -n1)"
          if [ -z "$req" ]; then echo "::error::could not parse disarm_core version from Cargo.toml"; exit 1; fi
          esc="${req//./\\.}"
          echo "Waiting for a non-yanked disarm $req.* on the crates.io sparse index…"
          deadline=$((SECONDS + 600))
          until curl -sf https://index.crates.io/di/sa/disarm | jq -r 'select(.yanked==false) | .vers' | grep -qE "^${esc}\.[0-9]+$"; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::disarm $req.* did not appear on crates.io within 10 minutes"; exit 1
            fi
            echo "  not yet; retrying in 15s…"; sleep 15
          done
          echo "disarm $req.* is available on crates.io."

  build:
    name: Build ${{ matrix.settings.target }}
    needs: wait-for-core
    # A default (`success()`) job is SKIPPED when a `needs:` dependency is skipped,
    # so a plain `needs:` would suppress the push-to-main validation build (where
    # wait-for-core is skipped). `!failure() && !cancelled()` runs this job when the
    # gate SUCCEEDED (release/dispatch, core is up) or was SKIPPED (push, #374 patch
    # path), but not when it FAILED (release, core never appeared in 10 min) — in
    # which case `publish` (needs: build) is skipped too, so no half-baked publish.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # aarch64 Linux is cross-compiled from x86_64 with the GNU cross linker.
            cross-linker: gcc-aarch64-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Build against the in-repo core on non-publish events (#374 drift gate)
        # On a push to main, the PUBLISHED core can lag the binding: a pre-release
        # binding may call a core API that isn't on crates.io yet (e.g. has_anomalies
        # before 0.11), so a published-core build fails to compile — the addon is red
        # until the matching core ships. Redirect the registry dep to the in-repo core
        # for these VALIDATION builds, exactly as ci.yml's `node` job does, so the
        # addon is exercised against the core it actually targets. On release /
        # workflow_dispatch (the real publish) we DON'T patch, so the shipped prebuild
        # is produced against the PUBLISHED core. Injected at runtime, never committed
        # (a committed relative-path patch would break the napi prebuild containers).
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        # The build matrix includes windows-latest, where `run:` defaults to
        # PowerShell (no `printf`, and `>>` writes UTF-16). Force bash so the append
        # is identical on every host.
        shell: bash
        run: printf '\n[patch.crates-io]\ndisarm = { path = "../.." }\n' >> Cargo.toml

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install the aarch64 cross linker (Linux arm64 only)
        # Truthy check: runs only on the one matrix entry that sets `cross-linker`
        # (an unset value is falsy), so the apt step never fires on macOS/Windows.
        if: matrix.settings.cross-linker
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.settings.cross-linker }}
          mkdir -p ~/.cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> ~/.cargo/config.toml

      - run: npm ci

      - name: Build the native addon
        # Against the PUBLISHED core on release/dispatch (the shipped prebuild);
        # against the in-repo core on push-to-main validation (see the #374 step above).
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} --js binding.js --dts binding.d.ts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: addon-${{ matrix.settings.target }}
          path: bindings/node/disarm.*.node
          if-no-files-found: error

  # ── Tier 3 release gate (#159) ──────────────────────────────────
  # The npm addon must not ship unless the SAME exhaustive + formal regimen that
  # gates the PyPI wheel and the crates.io core (publish.yml) is green. Reused
  # from .github/workflows/tier3.yml. Release/dispatch only — the exhaustive suite
  # is a release gate, not a per-push cost (the PR-time `node` job in ci.yml
  # already builds the addon + runs vitest against the core).
  tier3:
    name: Tier 3 (exhaustive + formal)
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/tier3.yml

  publish:
    name: Publish to npm
    needs: [build, tier3]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm provenance / trusted publishing — no long-lived token.
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json

      - run: npm ci

      - name: Collect the per-platform prebuilds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: addon-*
          merge-multiple: true
          path: bindings/node

      - name: Emit the TypeScript layer (index.js / index.d.ts) + binding loader
        # The release tarball ships compiled JS + types; the .node files came from
        # the build matrix above. Generate the loader/types without rebuilding Rust.
        run: |
          npx napi build --platform --js binding.js --dts binding.d.ts
          npx tsc

      - name: Update npm for OIDC trusted publishing
        # Trusted Publishing needs npm CLI >= 11.5 (Node 20 bundles 10.x). Pinned
        # for a reproducible release; bump deliberately.
        run: npm install -g npm@11.5.1

      - name: npm publish (OIDC trusted publishing + provenance)
        # No long-lived NPM_TOKEN: a Trusted Publisher configured on npmjs.org for
        # repo raeq/disarm + workflow publish-node.yml lets npm mint a short-lived
        # OIDC credential from `id-token: write` (the same model as the RubyGems
        # path in publish-ruby.yml, per BINDINGS.md). `--provenance` attaches a
        # signed build attestation.
        run: npm publish --provenance --access public
