name: Conversations resolved

# Hard, status-check-based gate that a PR has no unresolved review threads (#55).
# GitHub's "Require conversation resolution before merging" setting only disables the
# merge button and is bypassable; making this a *required status check* enforces it.
#
# The `pull_request_review_thread` event (resolved/unresolved) is what re-runs this when
# a reviewer resolves a thread — `pull_request_review` / `_review_comment` do NOT fire on
# resolution, so they would leave a stale red check.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_thread:
    types: [resolved, unresolved]

permissions:
  contents: read
  pull-requests: read

jobs:
  conversations-resolved:
    name: Conversations resolved
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any review thread is unresolved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          unresolved=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes { isResolved }
                  }
                }
              }
            }' -F owner="$OWNER" -F repo="$REPO" -F pr="$PR" \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length')
          echo "Unresolved review threads: ${unresolved}"
          if [ "${unresolved}" -gt 0 ]; then
            echo "::error::${unresolved} unresolved review thread(s). Resolve every review conversation before merging."
            exit 1
          fi
          echo "All review threads resolved."
