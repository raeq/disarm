name: DCO

# Enforces the Developer Certificate of Origin (#165): every commit in a PR must
# carry a `Signed-off-by:` trailer whose name/email match the commit author.
# Self-contained (no third-party action) to keep the supply chain small. Make
# "DCO sign-off" a required status check on `main` in branch protection.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          # --no-merges: merge commits are not authored content and need no sign-off.
          while read -r sha; do
            [ -z "$sha" ] && continue
            author="$(git show -s --format='%an <%ae>' "$sha")"
            signoffs="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")"
            if printf '%s\n' "$signoffs" | grep -qxF "$author"; then
              echo "ok   $sha  $author"
            else
              echo "::error::Commit $sha is missing 'Signed-off-by: $author'"
              echo "fail $sha  $(git show -s --format='%s' "$sha")"
              fail=1
            fi
          done < <(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA")
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more commits are not signed off. Add a sign-off with 'git commit -s' (or 'git rebase --signoff $BASE_SHA' for existing commits). See CONTRIBUTING.md → Sign your work."
            exit 1
          fi
          echo "All commits are signed off."
