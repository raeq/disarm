name: Dependency audit

# Dev-time dependency-freshness audit, run weekly as a backstop to dependabot.
# Dependabot is reactive and only as complete as its config; this surfaces drift
# across EVERY manifest (core + both binding crates, the Node package, the Ruby
# bundle) in one report so a major-version lag can't hide. See
# scripts/audit_dependencies.py and DEPENDENCY_UPGRADES.md.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: Audit every manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cargo.lock is gitignored, so generate the lockfiles in CI — the audit
      # compares resolved versions, and without them it would fall back to the
      # (broad) version reqs and over-report. The binding crates resolve the
      # `disarm` dependency from the registry, so no path patch is needed here.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Generate Cargo lockfiles
        run: |
          cargo generate-lockfile
          cargo generate-lockfile --manifest-path bindings/node/Cargo.toml
          cargo generate-lockfile --manifest-path bindings/ruby/Cargo.toml

      # Node + Ruby so `npm outdated` / `bundle outdated` can run; best-effort so
      # the cargo/crates.io audit still reports if a binding install hiccups.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install Node binding deps
        continue-on-error: true
        working-directory: bindings/node
        run: npm ci --ignore-scripts

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.3"
      - name: Install Ruby binding deps
        continue-on-error: true
        working-directory: bindings/ruby
        run: bundle install

      - name: Audit dependency freshness
        run: |
          python scripts/audit_dependencies.py | tee audit.txt
          {
            echo '## Dependency freshness audit'
            echo ''
            echo '```'
            cat audit.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Surface a major-version lag as an Actions warning (non-blocking — a
          # major migration is deliberate work, not a build break).
          if grep -q 'MAJOR behind' audit.txt; then
            echo "::warning::Dependencies are a major version behind — see the job summary."
          fi
