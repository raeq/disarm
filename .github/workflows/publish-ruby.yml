name: Ruby gem (#45)

# Build + test the Ruby binding on PRs that touch it; build precompiled platform
# gems and push them to RubyGems on a GitHub release. The native ext wraps the
# pure-Rust core (no Python), so the platform gems install with no Rust toolchain.
on:
  # Only `main` on push — a PR branch is already covered by `pull_request`, and
  # firing both for the same commit spawns two concurrent runs that race on the
  # identical rb-sys/bundler cache keys ("Unable to reserve cache … another job
  # may be creating this cache"), flaking the job. Post-merge `main` pushes still
  # re-validate.
  push:
    branches: [main]
    paths: ["bindings/ruby/**", "docs/**", "scripts/check_doc_ruby_examples.rb", ".github/workflows/publish-ruby.yml"]
  pull_request:
    # docs/** is included so the Ruby `# =>` doc examples (#50) are re-validated
    # against the built binding when a usage tab changes. Only the `test` job
    # runs on a PR (cross-gems/publish are gated to `release`), so this stays
    # cheap-ish — and bundler/cargo caches make the rebuild fast.
    paths: ["bindings/ruby/**", "docs/**", "scripts/check_doc_ruby_examples.rb", ".github/workflows/publish-ruby.yml"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3"]
    # bundler-cache in the setup action runs at the repo root, which has no
    # Gemfile — point bundler at the gem's Gemfile everywhere. GITHUB_TOKEN
    # authenticates the cargo-cache cleanup's cargo-binstall fetch, which
    # otherwise fails the job (exit 94, "Failed to retrieve token from gh auth
    # token") when it hits GitHub's unauthenticated API rate limit.
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/bindings/ruby/Gemfile
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: bindings/ruby
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Build against the in-repo core on non-publish events (#374 drift gate)
        # On a PR or a push to main, the PUBLISHED core can lag the binding: a
        # pre-release binding may call a core API that isn't on crates.io yet (e.g.
        # has_anomalies before 0.11), so a published-core build fails to compile —
        # the binding is red until the matching core ships. Redirect the registry
        # dep to the in-repo core for these VALIDATION builds, exactly as ci.yml's
        # `ruby` job does, so the binding is exercised against the core it actually
        # targets. On release / workflow_dispatch (the real publish) we DON'T patch,
        # so the shipped gem and its smoke test build against the PUBLISHED core.
        # Appended to the gem-root workspace manifest; injected at runtime, never
        # committed (a committed relative-path patch would break the cross-gem build).
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        # This job is ubuntu-only today, but force bash so the append is host-agnostic
        # if a runner is ever added (mirrors the Windows-safe step in publish-node.yml).
        shell: bash
        run: printf '\n[patch.crates-io]\ndisarm = { path = "../.." }\n' >> Cargo.toml

      - uses: oxidize-rb/actions/setup-ruby-and-rust@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          rustup-toolchain: stable
          bundler-cache: true
          cargo-cache: true
      - run: bundle exec rake compile
      - run: bundle exec rake spec
      # Verify the docs' Ruby `# =>` examples against the freshly-built binding
      # (#50). Run from the repo root so the script can reach docs/ and the gem.
      - name: Doc Ruby examples (#50)
        working-directory: ${{ github.workspace }}
        run: ruby scripts/check_doc_ruby_examples.rb

  cross-gems:
    name: Build gem (${{ matrix.platform }})
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - aarch64-linux
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: oxidize-rb/actions/setup-ruby-and-rust@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.1,3.2,3.3"
          working-directory: bindings/ruby
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cross-gem-${{ matrix.platform }}
          path: bindings/ruby/pkg/*.gem

  # ── Tier 3 release gate (#159) ──────────────────────────────────
  # The gem must not ship unless the SAME exhaustive + formal regimen that gates
  # the PyPI wheel and the crates.io core (publish.yml) is green. Reused from
  # .github/workflows/tier3.yml. Release/dispatch only — the exhaustive suite is a
  # release gate, not a per-PR/-push cost (the PR-time `test` job already builds +
  # RSpecs the binding against the core).
  tier3:
    name: Tier 3 (exhaustive + formal)
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/tier3.yml

  publish:
    name: Publish to RubyGems
    needs: [test, cross-gems, tier3]
    # Publish on a GitHub Release, or via a manual `workflow_dispatch` — the latter
    # is the recovery path when a release's gem build failed (e.g. binding drift)
    # but the registry version was never pushed. `gem push` of an existing version
    # fails by design, so a manual run can never overwrite a published gem.
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: rubygems
    # OIDC Trusted Publishing to RubyGems — no long-lived API key, and it satisfies
    # the account's MFA requirement (an API-key-only `gem push` is blocked by MFA).
    # Mirrors the PyPI/crates.io OIDC paths. Requires a Trusted Publisher configured
    # on rubygems.org for gem `disarm`, repo `raeq/disarm`, workflow
    # `publish-ruby.yml`, environment `rubygems`.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: cross-gem-*
          merge-multiple: true
          path: pkg
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "3.3"
      - name: Configure RubyGems credentials (OIDC trusted publishing)
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
      - name: gem push
        run: for g in pkg/*.gem; do gem push "$g"; done
