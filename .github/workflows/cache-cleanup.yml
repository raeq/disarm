name: Cleanup caches

# Two complementary mechanisms keep the repo under GitHub's 10 GB cache budget:
#
#   1. `cleanup-pr` — on PR close, delete caches scoped to that PR's branch.
#      GitHub scopes every cache to the branch that created it, so a closed PR's
#      caches (the heavy Swatinem/rust-cache entries especially) are pure dead
#      weight until LRU eviction reaps them. Deleting on close reclaims the space
#      immediately.
#
#   2. `sweep-stale` — on a schedule, delete any cache not *accessed* within the
#      last 36h. This catches stale entries the per-PR cleanup misses: abandoned
#      branches, renamed cache keys, scheduled-run artifacts. Staleness is keyed
#      on `last_accessed_at` (LRU), NOT `created_at` — a long-lived cache that is
#      still actively restored on every `main` build survives; only genuinely
#      idle ones are removed. (Swap `.last_accessed_at` -> `.created_at` below to
#      go by raw age instead.)
#
# Both jobs page through the full cache list via `gh api --paginate` (no 100-entry
# cap) and delete by id, tolerating only the 404 that results from racing with
# GitHub's own LRU eviction — any other failure (403/5xx/rate-limit) fails the
# step rather than silently leaving caches behind.
#
# Docs: https://docs.github.com/actions/using-workflows/caching-dependencies-to-speed-up-workflows#force-deleting-cache-entries

on:
  pull_request:
    types:
      - closed
  schedule:
    # Every 6h, so a stale entry's worst-case lifetime is ~36h + one interval.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      max_age_hours:
        description: "Delete caches not accessed within this many hours"
        default: "36"
        required: false

# Only `actions: write` is needed to delete caches; everything else stays read.
permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup-pr:
    name: Delete caches for closed PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Delete branch-scoped caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          set -euo pipefail

          # Delete one cache by id. Returns 0 if it is gone afterwards (including
          # a 404 race with LRU eviction); non-zero on any unexpected failure so
          # the caller can fail the step instead of silently dropping caches.
          delete_cache() {
            local id="$1" desc="$2" err
            if err=$(gh api --method DELETE "/repos/$REPO/actions/caches/$id" 2>&1); then
              echo "Deleted cache $id ($desc)"
              return 0
            fi
            if printf '%s\n' "$err" | grep -q 'HTTP 404'; then
              echo "Cache $id already gone ($desc) — raced with LRU eviction"
              return 0
            fi
            echo "ERROR deleting cache $id ($desc): $err" >&2
            return 1
          }

          echo "Listing caches scoped to $BRANCH"
          ids=$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/caches?ref=$BRANCH&per_page=100" \
            --jq '.actions_caches[].id')

          if [ -z "$ids" ]; then
            echo "No caches to delete."
            exit 0
          fi

          failures=0
          for id in $ids; do
            delete_cache "$id" "$BRANCH" || failures=$((failures + 1))
          done

          if [ "$failures" -ne 0 ]; then
            echo "::error::$failures cache deletion(s) failed"
            exit 1
          fi
          echo "Done."

  sweep-stale:
    name: Sweep caches idle past max age
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete caches not accessed within the threshold
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MAX_AGE_HOURS: ${{ github.event.inputs.max_age_hours || '36' }}
        run: |
          set -euo pipefail

          delete_cache() {
            local id="$1" desc="$2" err
            if err=$(gh api --method DELETE "/repos/$REPO/actions/caches/$id" 2>&1); then
              echo "Deleted cache $id ($desc)"
              return 0
            fi
            if printf '%s\n' "$err" | grep -q 'HTTP 404'; then
              echo "Cache $id already gone ($desc) — raced with LRU eviction"
              return 0
            fi
            echo "ERROR deleting cache $id ($desc): $err" >&2
            return 1
          }

          cutoff=$(date -u -d "$MAX_AGE_HOURS hours ago" +%s)
          echo "Deleting caches last accessed before $(date -u -d @"$cutoff" '+%Y-%m-%dT%H:%M:%SZ') (> ${MAX_AGE_HOURS}h idle)"

          # Page through every cache (no 100-entry cap); emit "id<TAB>last_accessed_at"
          # with fractional seconds stripped so GNU date parses it cleanly.
          gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/caches?per_page=100" \
            --jq '.actions_caches[] | [.id, (.last_accessed_at | sub("\\..*Z$"; "Z"))] | @tsv' > caches.tsv

          failures=0
          count=0
          # Read from a file (not a pipe) so the counters survive the loop.
          while IFS=$'\t' read -r id ts; do
            [ -n "$id" ] || continue
            accessed=$(date -u -d "$ts" +%s)
            if [ "$accessed" -lt "$cutoff" ]; then
              if delete_cache "$id" "idle since $ts"; then
                count=$((count + 1))
              else
                failures=$((failures + 1))
              fi
            fi
          done < caches.tsv

          echo "Deleted $count stale cache(s)."
          if [ "$failures" -ne 0 ]; then
            echo "::error::$failures cache deletion(s) failed"
            exit 1
          fi
