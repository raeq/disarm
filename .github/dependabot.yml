version: 2

# Policy (see DEPENDENCY_UPGRADES.md for the full methodology):
#
#  * Soak window via `cooldown` — a release is not even proposed until it has aged
#    (patch 2d / minor 7d / major 14d), so upstream point-fixes land and others surface
#    regressions first. We are never the beta tester.
#  * Grouping — each group is restricted to `minor` + `patch`, so routine low-risk bumps
#    arrive batched (low noise) while every *major* is left ungrouped and opens its own
#    PR. Majors carry breaking changes that need a deliberate migration and must not be
#    bundled (see the closed group PR #135, which mixed pyo3, phf, chardetng and criterion
#    majors into one unmergeable PR).
#  * Auto-merge — green PRs merge hands-off (.github/workflows/dependabot-auto-merge.yml);
#    a red PR is the only thing that pulls in a human (the migration procedure).
#  * Completeness — EVERY manifest is watched (core + both binding crates, the Node
#    package, the Ruby bundle). Watching only the root cargo/uv/actions is how napi (2→3)
#    and magnus (0.7→0.8) rotted unseen. scripts/audit_dependencies.py + the weekly
#    `dependency-audit` workflow are the dev-time backstop that keeps a future gap visible.
updates:
  # Keep third-party GitHub Actions (pinned to commit SHAs) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      actions:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  # Rust dependencies — keep every Cargo.lock fresh for RustSec advisory scanning
  # (#105) and to catch binding-crate drift. `directories` covers the core crate
  # AND both binding workspaces (bindings/node, bindings/ruby); watching only "/"
  # is how napi (2→3) and magnus (0.7→0.8) rotted unseen. Mirrored by the
  # `audit_dependencies.py` dev-time check, which audits the same manifests.
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/bindings/node"
      - "/bindings/ruby"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 2
    # phf 0.14 (and its phf_codegen/phf_shared/phf_generator family) moved to
    # edition 2024 / rust-version 1.85, but this crate's shipped MSRV is 1.81
    # (see `rust-version` in Cargo.toml). phf is a real runtime/build dependency
    # — built by downstream consumers, unlike the dev-only criterion exception —
    # so 0.14 would silently raise the consumer-facing MSRV. Hold at 0.13.x until
    # we deliberately bump the MSRV; revisit by dropping this ignore. (See the
    # closed migration attempt #509.)
    ignore:
      - dependency-name: "phf"
        versions: [">=0.14"]
      - dependency-name: "phf_codegen"
        versions: [">=0.14"]
    groups:
      # phf + phf_codegen are a lockstep pair: phf_codegen emits the static map
      # data in the exact binary layout the matching phf runtime reads back, so
      # the two MUST move together. The default policy leaves *majors* ungrouped
      # (one PR each), and for 0.x cargo crates a 0.13->0.14 bump IS a major, so
      # without this group dependabot split the pair into two PRs (#501/#502) —
      # each a version skew that corrupts every PHF lookup and fails CI. This
      # group has no `update-types` restriction, so once the MSRV hold above is
      # lifted the pair bumps together in a single PR. Listed before the `cargo`
      # catch-all because the first matching group wins.
      phf:
        patterns: ["phf", "phf_codegen"]
      cargo:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  # Python dependencies (dev/docs/test/bench extras; the package has no runtime deps).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      uv:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  # Node binding — JS toolchain (napi cli, biome, typescript, vitest).
  - package-ecosystem: "npm"
    directory: "/bindings/node"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      npm:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  # Ruby binding — gem toolchain (rspec, rubocop, rake-compiler).
  - package-ecosystem: "bundler"
    directory: "/bindings/ruby"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      bundler:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
