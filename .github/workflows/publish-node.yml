name: Node addon (#44)

# Build the napi-rs prebuilt binaries per platform/arch and publish them to npm on
# a GitHub release. The native addon wraps the pure-Rust core (no Python), so the
# prebuilds install with no Rust toolchain. PR-time build+test is handled by the
# `node` job in ci.yml (against the LOCAL core); this workflow is the release path
# (against the PUBLISHED core, like publish-ruby.yml) and the per-platform prebuild
# producer. Mirrors publish-ruby.yml.
on:
  push:
    branches: [main]
    paths: ["bindings/node/**", ".github/workflows/publish-node.yml"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: bindings/node

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # aarch64 Linux is cross-compiled from x86_64 with the GNU cross linker.
            cross-linker: gcc-aarch64-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install the aarch64 cross linker (Linux arm64 only)
        # Truthy check: runs only on the one matrix entry that sets `cross-linker`
        # (an unset value is falsy), so the apt step never fires on macOS/Windows.
        if: matrix.settings.cross-linker
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.settings.cross-linker }}
          mkdir -p ~/.cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> ~/.cargo/config.toml

      - run: npm ci

      - name: Build the native addon (against the published core)
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} --js binding.js --dts binding.d.ts

      - uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.settings.target }}
          path: bindings/node/disarm.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm provenance / trusted publishing — no long-lived token.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json

      - run: npm ci

      - name: Collect the per-platform prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: addon-*
          merge-multiple: true
          path: bindings/node

      - name: Emit the TypeScript layer (index.js / index.d.ts) + binding loader
        # The release tarball ships compiled JS + types; the .node files came from
        # the build matrix above. Generate the loader/types without rebuilding Rust.
        run: |
          npx napi build --platform --js binding.js --dts binding.d.ts
          npx tsc

      - name: Update npm for OIDC trusted publishing
        # Trusted Publishing needs npm CLI >= 11.5; Node 20's bundled npm is 10.x.
        run: npm install -g npm@latest

      - name: npm publish (OIDC trusted publishing + provenance)
        # No long-lived NPM_TOKEN: a Trusted Publisher configured on npmjs.org for
        # repo raeq/disarm + workflow publish-node.yml lets npm mint a short-lived
        # OIDC credential from `id-token: write` (the same model as the RubyGems
        # path in publish-ruby.yml, per BINDINGS.md). `--provenance` attaches a
        # signed build attestation.
        run: npm publish --provenance --access public
