name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"  # Weekly RustSec advisory scan (Monday 05:00 UTC)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:

  # ── Detect whether code changed ─────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      ruby: ${{ steps.filter.outputs.ruby }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**.py'
              - '**.rs'
              - '**.toml'
              - '**.tsv'
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - '**.md'
              - '.github/workflows/**'
            # The Ruby binding must rebuild when ITS OWN code changes AND when the
            # CORE it wraps changes (#374): a core API change (e.g. the 0.10
            # tuple→struct return) can break the gem, and that break must surface
            # on the same PR — not at release. Core = src/**, build.rs, the crate
            # manifests; binding = bindings/ruby/**.
            ruby:
              - 'bindings/ruby/**'
              - 'src/**'
              - 'build.rs'
              - 'Cargo.toml'
              - '.github/workflows/ci.yml'
            # Same drift-gate rationale as `ruby` (#374): rebuild the Node binding
            # when ITS code OR the CORE it wraps changes (#44). `docs/**` is included
            # so the Node `// =>` doc examples re-validate against the built addon
            # when a usage tab or the API page changes.
            node:
              - 'bindings/node/**'
              - 'src/**'
              - 'build.rs'
              - 'Cargo.toml'
              - 'docs/**'
              - 'scripts/check_doc_node_examples.mjs'
              - '.github/workflows/ci.yml'


  # ── Lint and format (Linux only, code changes only) ─────────────
  lint:
    name: Lint & format
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust clippy (pure core)
        # Default features = the pyo3-free crates.io core (#38/#42). --all-targets
        # so test and bench code is linted too (it rots otherwise).
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: Rust clippy (extension-module)
        # Lints the binding layer too, and catches genuinely-dead code that the
        # pure build's `cfg(not(extension-module))` dead_code allow would hide.
        run: cargo clippy --all-targets --features extension-module -- -D warnings

      - name: Pure core has no pyo3 (#38/#42 acceptance gate)
        # The default-feature crate is the pyo3-free crates.io core; assert the
        # default dependency tree carries no pyo3 (a leak would re-couple the pure
        # build to libpython). The extension lives behind `--features extension-module`.
        run: |
          if cargo tree -e no-dev | grep -qi pyo3; then
            echo "::error::pyo3 leaked into the default (pure) dependency tree"
            cargo tree -e no-dev | grep -i pyo3
            exit 1
          fi
          echo "OK: no pyo3 in the default dependency tree"
          # #208: logging is opt-in (`--features log`); the default build must
          # pull in NO `log` crate, so the shipped artifact pays zero cost.
          if cargo tree -e no-dev | grep -qiE '^\S*log v|[└├]── log v'; then
            echo "::error::log leaked into the default tree (#208: logging must be opt-in)"
            cargo tree -e no-dev | grep -i 'log v'
            exit 1
          fi
          echo "OK: no log in the default dependency tree"

      - name: Logging build + tests (#208, --features log / log-content)
        # The opt-in logging facade compiles under every feature combo, the hot
        # loops stay log-free (guard test), and default-level records carry no
        # content (redaction sentinel test).
        run: |
          cargo clippy --all-targets --no-default-features --features log -- -D warnings
          cargo build --no-default-features --features log-content
          cargo test --no-default-features --features log --test logging --test hot_path_guard

      - name: Cargo package — crates.io publish dry-run (#42)
        # Build the crate from a packaged tarball with the default (pure) feature
        # set, exactly as a `cargo add disarm` consumer receives it. Catches
        # missing files (readme/license), bad metadata, or pure-build breakage
        # before a release ever reaches crates.io.
        run: cargo package --no-default-features

      - name: Rust API semver check (#42, advisory)
        # The semver-governed Rust surface is `disarm::api` + the error types
        # (see docs/RUST_API.md). Advisory for now: the only prior crates.io
        # version is a 0.0.0 placeholder with no API to diff against. Once 0.10.0
        # is the published baseline this becomes a hard gate (drop continue-on-error).
        continue-on-error: true
        run: |
          cargo install cargo-semver-checks --locked || true
          cargo semver-checks check-release --default-features

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install ruff==0.15.4 mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy python/disarm --ignore-missing-imports


  # ── Test (Linux only, code changes only) ────────────────────────
  test:
    name: Test (ubuntu-latest, Python 3.12)
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust tests
        run: cargo test --no-default-features

      - name: Install maturin
        run: pip install maturin[patchelf]

      - name: Build wheel and install
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_typing.py -m "not formal and not hypothesis" -q --tb=short --cov=disarm --cov-report=xml --cov-report=term-missing

      - name: Run doctests
        run: |
          DISARM_DIR=$(python -c "import disarm, os; print(os.path.dirname(disarm.__file__))")
          pytest --doctest-modules "$DISARM_DIR/__init__.py" "$DISARM_DIR/_compat.py" -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml


  # ── Cookbook doc-tests (#154: executable, asserted recipes) ─────
  # Runs on code OR docs changes: a doc example can break from a prose edit
  # or from an API change. Executes the allowlisted recipes in docs/conftest.py
  # against the built wheel, so a wrong/broken example turns CI red.
  doc-tests:
    name: Doc tests (Sybil)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install maturin
        run: pip install maturin[patchelf]

      - name: Build wheel and install
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"

      - name: Anti-rot doc-claim lint (#156)
        run: python3 scripts/check_doc_claims.py

      - name: Run cookbook doc-tests (per-file isolated)
        run: python3 scripts/run_doc_tests.py

      # The Rust analogue of the Sybil gate: extract every ```rust doc block and
      # compile + run it against the pure core, with deny(unused_must_use) so an
      # example that discards its result fails. Catches signature/output drift in
      # the per-language usage tabs (#50). The job already sets up the rust
      # toolchain above; this step is its consumer.
      - name: Doc Rust examples (#50)
        run: python3 scripts/check_doc_rust_examples.py


  # ── Ruby binding, built against the LOCAL core (#374) ───────────
  # PR-time gate for the Ruby gem. The release workflow (publish-ruby.yml) builds
  # the binding against the PUBLISHED core; this job builds it against the
  # in-repo core, so an UNRELEASED core API change that breaks the gem fails here
  # — on the PR that introduces it — instead of silently at release (which is how
  # the 0.10.0 gem shipped broken, #364–#367). Runs on binding OR core changes.
  ruby:
    name: Ruby binding (Ruby ${{ matrix.ruby }})
    needs: changes
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3"]  # the range magnus 0.7 supports
    env:
      # bundler-cache runs at the repo root (no Gemfile there) unless pointed at
      # the gem's Gemfile; GITHUB_TOKEN authenticates the cargo-cache tooling.
      # (Mirrors publish-ruby.yml.)
      BUNDLE_GEMFILE: ${{ github.workspace }}/bindings/ruby/Gemfile
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build the binding against the in-repo core (#374 drift gate)
        # The ext pins the core as a REGISTRY dep (version = "0.10") so the
        # cross-gem build — which mounts only the gem dir — stays self-contained.
        # Redirect that dep to the in-repo core for this CI build only, so an
        # unreleased core change is actually exercised. This patch is injected at
        # runtime and never committed: a relative-path patch would break the
        # cross-gem build, and gating it here keeps the release path on the
        # published core.
        run: printf '\n[patch.crates-io]\ndisarm = { path = "../.." }\n' >> bindings/ruby/Cargo.toml

      - uses: oxidize-rb/actions/setup-ruby-and-rust@e5f9a49a7812a078584072f6e3f657ad247c8771  # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          rustup-toolchain: stable
          bundler-cache: true
          cargo-cache: true

      - name: Lint (RuboCop)
        working-directory: bindings/ruby
        run: bundle exec rubocop

      - name: Compile + RSpec (against the local core)
        working-directory: bindings/ruby
        run: |
          bundle exec rake compile
          bundle exec rake spec

      - name: Doc Ruby examples against the local core (#50/#374)
        # The docs' Ruby `# =>` examples already run against the PUBLISHED gem in
        # publish-ruby.yml. Running them here too — against the freshly-built
        # LOCAL-core gem — extends the drift gate to documented output: a core
        # change that alters a documented Ruby result fails on its own PR. Runs
        # from the repo root so the script can reach docs/ and the built bundle.
        run: ruby scripts/check_doc_ruby_examples.rb


  # ── Node binding, built against the LOCAL core (#44 / #374) ─────
  # PR-time gate for the napi-rs binding. Mirrors the `ruby` job: the ext pins the
  # core as a REGISTRY dep, so a CI-only `[patch.crates-io]` redirect builds it
  # against the in-repo core, surfacing an unreleased core API change that would
  # break the addon on the PR that introduces it. Builds the native addon + the
  # TypeScript layer, then runs the vitest suite. Triggers on binding OR core changes.
  node:
    name: Node binding (Node ${{ matrix.node }})
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The shipped N-API 8 addon supports Node 14+ (package.json `engines`),
        # but the test runner does not: vitest 4 pulls vite 8, which requires Node
        # ^20.19 || >=22.12. So the suite runs on 20/22; the prebuilt addon is the
        # same ABI-stable binary Node 14–18 consumers load.
        node: ["20", "22"]
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build the binding against the in-repo core (#374 drift gate)
        # Never committed: a relative-path patch would break the napi prebuild
        # containers (which mount only this dir); gating it here keeps the release
        # path on the published core. Path is relative to bindings/node/Cargo.toml.
        run: printf '\n[patch.crates-io]\ndisarm = { path = "../.." }\n' >> Cargo.toml

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: bindings/node

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json

      - run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Build (napi addon + TypeScript) and test against the local core
        run: |
          npm run build:debug
          npm test

      - name: Doc Node examples against the local core (#44)
        # The docs' Node `// =>` examples (getting-started, the API page, the usage
        # tabs) run against the freshly-built LOCAL-core addon, so a core change
        # that alters a documented Node result fails on its own PR. Runs from the
        # repo root so the script can reach docs/ and the built addon.
        working-directory: ${{ github.workspace }}
        run: node scripts/check_doc_node_examples.mjs


  # ── Security audit (#105: cargo audit for RustSec advisories) ──
  # Runs on every PR and weekly. Cargo.lock is not committed (it is .gitignored
  # for this library), so generate it before auditing.
  cargo-audit:
    name: Cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


  # ── Supply-chain policy gate (#260: licenses, bans, sources via cargo-deny) ──
  # Runs on every PR (like cargo audit): a dependency's license or source can
  # change without any code change here. Cargo.lock is gitignored, so generate it
  # first; the policy lives in deny.toml.
  cargo-deny:
    name: Cargo deny (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@8a45e1c7c9a95dfae3276e89a553705e40ae45a2  # v2.0.20
        with:
          # licenses / bans / sources only — RustSec advisories are owned by the
          # dedicated `cargo audit` job above (#260).
          command: check licenses bans sources


  # ── Status gates (always run, for branch protection) ────────────
  # These MUST run on every PR so branch protection checks report.
  # On doc-only PRs, lint/test are skipped — gates pass on those.
  # The RustSec audit, however, blocks merge on EVERY PR (#195): an advisory can
  # land on a dependency without any code change here.
  rust-ok:
    name: Rust checks passed
    if: always()
    needs: [changes, lint, test, cargo-audit, cargo-deny]
    runs-on: ubuntu-latest
    steps:
      - run: |
          CODE="${{ needs.changes.outputs.code }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          AUDIT="${{ needs['cargo-audit'].result }}"
          DENY="${{ needs['cargo-deny'].result }}"

          # A RustSec advisory blocks merge regardless of code changes (#195).
          if [[ "$AUDIT" != "success" ]]; then
            echo "cargo audit ($AUDIT) — an outstanding RustSec advisory blocks merge"
            exit 1
          fi

          # A supply-chain policy violation (license/ban/source) blocks merge on
          # every PR (#260): a dependency's license or source can change without
          # any code change here.
          if [[ "$DENY" != "success" ]]; then
            echo "cargo deny ($DENY) — a supply-chain policy violation blocks merge"
            exit 1
          fi

          if [[ "$CODE" != "true" ]]; then
            echo "No code changes — skipping lint/test gate"
            exit 0
          fi

          if [[ "$LINT" != "success" || "$TEST" != "success" ]]; then
            echo "lint ($LINT) or test ($TEST) failed"
            exit 1
          fi

  ruby-ok:
    name: Ruby checks passed
    if: always()
    needs: [changes, ruby]
    runs-on: ubuntu-latest
    steps:
      - run: |
          RUBY_CHANGED="${{ needs.changes.outputs.ruby }}"
          RUBY_RESULT="${{ needs.ruby.result }}"

          # On a PR that touches neither the binding nor the core, the ruby job
          # is skipped — the gate passes (nothing to verify).
          if [[ "$RUBY_CHANGED" != "true" ]]; then
            echo "No binding/core changes — Ruby gate not required"
            exit 0
          fi

          # The binding (or the core it wraps) changed: the build+RSpec against
          # the local core must have passed (#374).
          if [[ "$RUBY_RESULT" != "success" ]]; then
            echo "ruby ($RUBY_RESULT) — the Ruby binding failed to build/spec against the local core"
            exit 1
          fi
          echo "Ruby binding OK against the local core"

  node-ok:
    name: Node checks passed
    if: always()
    needs: [changes, node]
    runs-on: ubuntu-latest
    steps:
      - run: |
          NODE_CHANGED="${{ needs.changes.outputs.node }}"
          NODE_RESULT="${{ needs.node.result }}"

          if [[ "$NODE_CHANGED" != "true" ]]; then
            echo "No binding/core changes — Node gate not required"
            exit 0
          fi

          if [[ "$NODE_RESULT" != "success" ]]; then
            echo "node ($NODE_RESULT) — the Node binding failed to build/test against the local core"
            exit 1
          fi
          echo "Node binding OK against the local core"

  python-ok:
    name: Python checks passed
    if: always()
    needs: [changes, lint, test, doc-tests]
    runs-on: ubuntu-latest
    steps:
      - run: |
          CODE="${{ needs.changes.outputs.code }}"
          DOCS="${{ needs.changes.outputs.docs }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          DOCTESTS="${{ needs['doc-tests'].result }}"

          # Cookbook doc-tests run on code OR docs changes (#154); a doc example
          # can break from either. Block merge if they ran and did not pass.
          if [[ "$CODE" == "true" || "$DOCS" == "true" ]]; then
            if [[ "$DOCTESTS" != "success" ]]; then
              echo "doc-tests ($DOCTESTS) failed"
              exit 1
            fi
          fi

          if [[ "$CODE" != "true" ]]; then
            echo "No code changes — skipping lint/test checks"
            exit 0
          fi

          if [[ "$LINT" != "success" || "$TEST" != "success" ]]; then
            echo "lint ($LINT) or test ($TEST) failed"
            exit 1
          fi
